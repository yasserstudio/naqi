name: Build & Release

# Free-CI build path. Triggered by `repository_dispatch` from the private
# source repo (yasserstudio/naqi-private) on every `v*` tag. Clones the
# private source onto the (ephemeral) public-runner, builds + signs +
# notarizes, and publishes a DRAFT release here on yasserstudio/naqi.
# publish-homebrew.yml then fires when the draft is manually published.
#
# Why this lives on the public repo: GitHub Actions on public repos has
# unlimited free minutes across all platforms. The private repo only
# costs minutes for the lightweight trigger workflow.
#
# Required secrets (all on yasserstudio/naqi):
#   - PRIVATE_REPO_READ_TOKEN    fine-grained PAT, contents:read on
#                                yasserstudio/naqi-private
#   - TAURI_SIGNING_PRIVATE_KEY  (updater)
#   - TAURI_SIGNING_PRIVATE_KEY_PASSWORD
#   - APPLE_CERTIFICATE          (Developer ID, base64 legacy-format p12)
#   - APPLE_CERTIFICATE_PASSWORD
#   - APPLE_SIGNING_IDENTITY
#   - APPLE_ID / APPLE_PASSWORD / APPLE_TEAM_ID

on:
  repository_dispatch:
    types: [build-release]

permissions:
  contents: write

jobs:
  prepare:
    name: Resolve version + clone source
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      notes: ${{ steps.notes.outputs.notes }}
    steps:
      - name: Resolve tag from dispatch payload
        id: meta
        env:
          TAG: ${{ github.event.client_payload.tag }}
        run: |
          if [ -z "$TAG" ]; then
            echo "Missing tag in dispatch payload" >&2
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout private source at tag
        uses: actions/checkout@v5
        with:
          repository: yasserstudio/naqi-private
          token: ${{ secrets.PRIVATE_REPO_READ_TOKEN }}
          ref: ${{ steps.meta.outputs.tag }}
          fetch-depth: 1
          path: source

      - name: Extract release notes from CHANGELOG
        id: notes
        working-directory: source
        run: |
          # sed range (unlike awk's) does not re-check the end pattern on
          # the start line, so `/^## \[VERSION\]/,/^## \[/` correctly spans
          # from the target section header through the next section header.
          # Strip the section header (line 1) and the next-section header
          # (last line) so NOTES contains only the body.
          NOTES=$(sed -n "/^## \[${{ steps.meta.outputs.version }}\]/,/^## \[/p" CHANGELOG.md | sed '1d;$d')
          if [ -z "$NOTES" ]; then
            echo "ERROR: no release notes extracted for ${{ steps.meta.outputs.version }}" >&2
            echo "Verify CHANGELOG.md has a '## [${{ steps.meta.outputs.version }}]' section" >&2
            exit 1
          fi
          {
            echo 'notes<<EOF'
            echo "$NOTES"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.target }})
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            platform: macos
          - target: x86_64-apple-darwin
            runner: macos-latest
            platform: macos
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            platform: windows
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            platform: linux
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout private source at tag
        uses: actions/checkout@v5
        with:
          repository: yasserstudio/naqi-private
          token: ${{ secrets.PRIVATE_REPO_READ_TOKEN }}
          ref: ${{ needs.prepare.outputs.tag }}
          fetch-depth: 1

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Collect artifacts (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          mkdir -p release-artifacts
          cp apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg release-artifacts/ 2>/dev/null || true
          cp apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz release-artifacts/ 2>/dev/null || true
          cp apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig release-artifacts/ 2>/dev/null || true
          ls -la release-artifacts/

      - name: Collect artifacts (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          mkdir -p release-artifacts
          cp apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe release-artifacts/ 2>/dev/null || true
          cp apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip release-artifacts/ 2>/dev/null || true
          cp apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip.sig release-artifacts/ 2>/dev/null || true
          ls -la release-artifacts/

      - name: Collect artifacts (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          mkdir -p release-artifacts
          cp apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage release-artifacts/ 2>/dev/null || true
          cp apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.tar.gz release-artifacts/ 2>/dev/null || true
          cp apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.tar.gz.sig release-artifacts/ 2>/dev/null || true
          cp apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb release-artifacts/ 2>/dev/null || true
          ls -la release-artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: release-artifacts/
          if-no-files-found: error

  generate-updater-manifest:
    name: Generate latest.json
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: downloaded

      - name: Assemble latest.json
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          NOTES: ${{ needs.prepare.outputs.notes }}
        run: |
          mkdir -p flat
          find downloaded -type f -exec cp {} flat/ \;
          ls -la flat/

          python3 <<'PY' > latest.json
          import datetime, glob, json, os

          def read_sig(patterns):
              for p in patterns:
                  for match in glob.glob(f"flat/{p}"):
                      with open(match) as f:
                          return f.read().strip()
              return None

          version = os.environ["VERSION"]
          base = f"https://github.com/yasserstudio/naqi/releases/download/v{version}"
          platforms = {}

          sig = read_sig([f"*aarch64*.app.tar.gz.sig"])
          if sig:
              platforms["darwin-aarch64"] = {
                  "signature": sig,
                  "url": f"{base}/Naqi_{version}_aarch64.app.tar.gz",
              }

          sig = read_sig([f"*x64*.app.tar.gz.sig", f"*x86_64*.app.tar.gz.sig"])
          if sig:
              platforms["darwin-x86_64"] = {
                  "signature": sig,
                  "url": f"{base}/Naqi_{version}_x64.app.tar.gz",
              }

          sig = read_sig([f"*nsis.zip.sig"])
          if sig:
              platforms["windows-x86_64"] = {
                  "signature": sig,
                  "url": f"{base}/Naqi_{version}_x64-setup.nsis.zip",
              }

          sig = read_sig([f"*amd64*.AppImage.tar.gz.sig"])
          if sig:
              platforms["linux-x86_64"] = {
                  "signature": sig,
                  "url": f"{base}/naqi_{version}_amd64.AppImage.tar.gz",
              }

          manifest = {
              "version": version,
              "notes": os.environ["NOTES"],
              "pub_date": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
              "platforms": platforms,
          }
          print(json.dumps(manifest, indent=2))
          PY
          cat latest.json

      - name: Upload latest.json
        uses: actions/upload-artifact@v4
        with:
          name: updater-manifest
          path: latest.json

  publish:
    name: Publish draft release
    needs: [prepare, build, generate-updater-manifest]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: downloaded

      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find downloaded -type f -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
          NOTES: ${{ needs.prepare.outputs.notes }}
        run: |
          printf '%s\n' "$NOTES" > release-notes.md
          gh release create "$TAG" \
            --repo ${{ github.repository }} \
            --title "Naqi $TAG" \
            --notes-file release-notes.md \
            --draft \
            release-assets/*
