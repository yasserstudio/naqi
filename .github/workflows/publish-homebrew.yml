name: Publish Homebrew

# Fires when a release is published on this public repo (after the draft
# that naqi-private's release.yml creates gets manually reviewed + published).
# Downloads both macOS DMGs, computes SHA256, and pushes an updated cask to
# yasserstudio/homebrew-naqi.
#
# Required secret: HOMEBREW_TAP_TOKEN
#   A fine-grained PAT with contents:write on yasserstudio/homebrew-naqi.

on:
  release:
    types: [published]

jobs:
  update-tap:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    steps:
      - name: Download DMGs and compute SHA256
        id: sha
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${TAG#v}"
          BASE="https://github.com/yasserstudio/naqi/releases/download/${TAG}"

          curl -fsSL -H "Authorization: token $GITHUB_TOKEN" \
            -o arm.dmg "${BASE}/Naqi_${VERSION}_aarch64.dmg"
          curl -fsSL -H "Authorization: token $GITHUB_TOKEN" \
            -o intel.dmg "${BASE}/Naqi_${VERSION}_x64.dmg"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "arm_sha=$(sha256sum arm.dmg | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "intel_sha=$(sha256sum intel.dmg | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Clone tap and update cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.sha.outputs.version }}
          ARM_SHA: ${{ steps.sha.outputs.arm_sha }}
          INTEL_SHA: ${{ steps.sha.outputs.intel_sha }}
        run: |
          git clone \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/yasserstudio/homebrew-naqi.git" \
            tap

          cat > tap/Casks/naqi.rb << 'TEMPLATE'
          cask "naqi" do
            version "NAQI_VERSION"

            on_arm do
              sha256 "NAQI_ARM_SHA"
              url "https://github.com/yasserstudio/naqi/releases/download/v#{version}/Naqi_#{version}_aarch64.dmg"
            end
            on_intel do
              sha256 "NAQI_INTEL_SHA"
              url "https://github.com/yasserstudio/naqi/releases/download/v#{version}/Naqi_#{version}_x64.dmg"
            end

            name "Naqi"
            desc "AI workspace hygiene tool for macOS"
            homepage "https://getnaqi.com"

            livecheck do
              url :url
              strategy :github_latest
            end

            depends_on macos: ">= :catalina"

            app "Naqi.app"

            zap trash: [
              "~/.naqi",
              "~/Library/Application Support/app.naqi.desktop",
              "~/Library/Logs/app.naqi.desktop",
            ]
          end
          TEMPLATE

          sed -i "s/NAQI_VERSION/${VERSION}/g" tap/Casks/naqi.rb
          sed -i "s/NAQI_ARM_SHA/${ARM_SHA}/g"   tap/Casks/naqi.rb
          sed -i "s/NAQI_INTEL_SHA/${INTEL_SHA}/g" tap/Casks/naqi.rb

          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/naqi.rb
          git commit -m "chore: update naqi to v${VERSION}"
          git push
