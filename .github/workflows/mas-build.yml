name: Mac App Store Build

# Free-CI MAS build. Triggered by `repository_dispatch` from the private
# source repo (yasserstudio/naqi-private). Clones the private source,
# builds a universal macOS binary, signs for MAS, packages as .pkg, and
# uploads to App Store Connect.
#
# Why this lives on the public repo: GitHub Actions on public repos has
# unlimited free minutes across all platforms — macOS runners included.
#
# Required secrets (all on yasserstudio/naqi):
#   - PRIVATE_REPO_READ_TOKEN
#   - APPLE_MAS_APP_CERTIFICATE / _PASSWORD
#   - APPLE_MAS_APP_SIGNING_IDENTITY
#   - APPLE_MAS_INSTALLER_CERTIFICATE / _PASSWORD
#   - APPLE_MAS_INSTALLER_SIGNING_IDENTITY
#   - APPLE_MAS_PROVISIONING_PROFILE
#   - KEYCHAIN_PASSWORD
#   - ASC_KEY_ID / ASC_ISSUER_ID / ASC_PRIVATE_KEY / ASC_APP_ID

on:
  repository_dispatch:
    types: [mas-build]

permissions:
  contents: read

jobs:
  build-and-upload:
    name: Build & Upload to App Store Connect
    runs-on: macos-latest
    defaults:
      run:
        working-directory: source/apps/desktop

    steps:
      - name: Checkout private source
        uses: actions/checkout@v5
        with:
          repository: yasserstudio/naqi-private
          token: ${{ secrets.PRIVATE_REPO_READ_TOKEN }}
          fetch-depth: 1
          path: source

      - name: Install Rust stable (universal)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: source/apps/desktop/src-tauri

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: source/apps/desktop/package.json

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: source/apps/desktop/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # ── Certificates & Provisioning ───────────────────────────────────────
      - name: Import MAS signing certificates
        working-directory: .
        env:
          MAS_APP_CERT: ${{ secrets.APPLE_MAS_APP_CERTIFICATE }}
          MAS_APP_CERT_PWD: ${{ secrets.APPLE_MAS_APP_CERTIFICATE_PASSWORD }}
          MAS_INSTALLER_CERT: ${{ secrets.APPLE_MAS_INSTALLER_CERTIFICATE }}
          MAS_INSTALLER_CERT_PWD: ${{ secrets.APPLE_MAS_INSTALLER_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PWD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN=mas-build.keychain
          security create-keychain -p "$KEYCHAIN_PWD" $KEYCHAIN
          security default-keychain -s $KEYCHAIN
          security unlock-keychain -p "$KEYCHAIN_PWD" $KEYCHAIN
          security set-keychain-settings -t 3600 -u $KEYCHAIN

          echo "$MAS_APP_CERT" | base64 --decode > /tmp/mas-app.p12
          security import /tmp/mas-app.p12 -k $KEYCHAIN -P "$MAS_APP_CERT_PWD" -T /usr/bin/codesign -T /usr/bin/productbuild
          rm /tmp/mas-app.p12

          echo "$MAS_INSTALLER_CERT" | base64 --decode > /tmp/mas-installer.p12
          security import /tmp/mas-installer.p12 -k $KEYCHAIN -P "$MAS_INSTALLER_CERT_PWD" -T /usr/bin/productbuild
          rm /tmp/mas-installer.p12

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" $KEYCHAIN

      - name: Write provisioning profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.APPLE_MAS_PROVISIONING_PROFILE }}
        run: |
          echo "$PROVISIONING_PROFILE" | base64 --decode > src-tauri/embedded.provisionprofile

      # ── Remove system lzma to prevent non-public API linkage ────────────
      - name: Remove system liblzma
        working-directory: .
        run: brew uninstall --ignore-dependencies xz || true

      # ── Build (both arches) ───────────────────────────────────────────────
      - name: Build Naqi arm64 (MAS)
        env:
          VITE_MAS: 'true'
          TAURI_SIGNING_PRIVATE_KEY: ''
        run: |
          pnpm tauri build \
            --config src-tauri/tauri.mas.conf.json \
            --features mas \
            --target aarch64-apple-darwin \
            --bundles app

      - name: Build Naqi x86_64 (MAS)
        env:
          VITE_MAS: 'true'
          TAURI_SIGNING_PRIVATE_KEY: ''
        run: |
          pnpm tauri build \
            --config src-tauri/tauri.mas.conf.json \
            --features mas \
            --target x86_64-apple-darwin \
            --bundles app

      # ── Combine into universal binary ─────────────────────────────────────
      - name: Create universal binary with lipo
        run: |
          ARM_BIN="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Naqi.app/Contents/MacOS/Naqi"
          X86_BIN="src-tauri/target/x86_64-apple-darwin/release/bundle/macos/Naqi.app/Contents/MacOS/Naqi"
          APP_PATH="$(pwd)/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Naqi.app"

          lipo -create "$ARM_BIN" "$X86_BIN" -output "$ARM_BIN"
          lipo -info "$ARM_BIN"
          echo "APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      # ── Patch Info.plist for App Store ────────────────────────────────────
      # Tauri writes semver pre-release (e.g. "1.0.0-beta.2") which Apple
      # rejects (ITMS-90060). Patch to clean version + numeric build number.
      - name: Patch Info.plist versions
        run: |
          PLIST="$APP_PATH/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ github.event.client_payload.version || '1.0.0' }}" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.event.client_payload.build_number || '10' }}" "$PLIST"

      # ── Re-sign the universal .app ────────────────────────────────────────
      - name: Re-sign universal .app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_MAS_APP_SIGNING_IDENTITY }}
        run: |
          codesign --deep --force \
            --sign "$APPLE_SIGNING_IDENTITY" \
            --entitlements src-tauri/entitlements.mas.plist \
            --options runtime \
            "$APP_PATH"
          codesign --verify --deep --strict "$APP_PATH"

      # ── Package as .pkg ───────────────────────────────────────────────────
      - name: Package as installer (.pkg)
        env:
          INSTALLER_SIGNING_IDENTITY: ${{ secrets.APPLE_MAS_INSTALLER_SIGNING_IDENTITY }}
        run: |
          PKG_PATH="$(pwd)/Naqi.pkg"

          productbuild \
            --component "$APP_PATH" /Applications \
            --sign "$INSTALLER_SIGNING_IDENTITY" \
            "$PKG_PATH"

          echo "PKG_PATH=$PKG_PATH" >> $GITHUB_ENV

      # ── Upload via ASC ────────────────────────────────────────────────────
      - name: Install ASC CLI
        working-directory: .
        run: brew install asc

      - name: Authenticate with App Store Connect
        working-directory: .
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          echo "$ASC_PRIVATE_KEY" | base64 --decode > /tmp/AuthKey.p8
          chmod 600 /tmp/AuthKey.p8
          asc auth login \
            --name "naqi-ci" \
            --key-id "$ASC_KEY_ID" \
            --issuer-id "$ASC_ISSUER_ID" \
            --private-key /tmp/AuthKey.p8
          rm /tmp/AuthKey.p8

      - name: Upload build to App Store Connect
        working-directory: .
        env:
          ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
        run: |
          asc builds upload \
            --app "$ASC_APP_ID" \
            --pkg "$PKG_PATH" \
            --version "${{ github.event.client_payload.version || '1.0.0' }}" \
            --build-number "${{ github.event.client_payload.build_number || '10' }}" \
            --output json

      # ── Submit (optional, controlled by dispatch payload) ─────────────────
      - name: Submit for App Review
        if: ${{ github.event.client_payload.submit == 'true' }}
        working-directory: .
        env:
          ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
        run: |
          echo "Waiting for build processing..."
          sleep 60
          asc review submit \
            --app "$ASC_APP_ID" \
            --version "${{ github.event.client_payload.version || '1.0.0' }}" \
            --platform MAC_OS \
            --confirm

      # ── Cleanup ───────────────────────────────────────────────────────────
      - name: Clean up keychain
        if: always()
        working-directory: .
        run: security delete-keychain mas-build.keychain 2>/dev/null || true
