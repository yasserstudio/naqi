name: Bug Report
description: Something isn't working correctly
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows
        - Linux
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Naqi version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: checkboxes
    id: clients
    attributes:
      label: AI clients involved
      options:
        - label: Claude Desktop
        - label: Claude Code
        - label: Cursor
        - label: VS Code
        - label: Windsurf
        - label: GitHub Copilot
        - label: JetBrains AI
        - label: Zed
        - label: Amp
        - label: Kiro
        - label: Other
